name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          $version = (Get-Content -Path VERSION -Raw).Trim()
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          }
          "MICMUTE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MICMUTE_ARTIFACT=MicMute-$version-win-x64" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        shell: pwsh
        run: .\build.ps1 -Version $env:MICMUTE_VERSION

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path bin/MicMute.exe -Destination dist/MicMute.exe -Force
          Compress-Archive -Path dist/MicMute.exe -DestinationPath "dist/$env:MICMUTE_ARTIFACT.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MICMUTE_ARTIFACT }}
          path: |
            bin/MicMute.exe
            dist/${{ env.MICMUTE_ARTIFACT }}.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MicMute ${{ env.MICMUTE_VERSION }}
          tag_name: ${{ github.ref_name }}
          make_latest: true
          body: |
            MicMute ${{ env.MICMUTE_VERSION }}

            Windows x64 build artifact is attached below.
          files: |
            bin/MicMute.exe
            dist/${{ env.MICMUTE_ARTIFACT }}.zip
